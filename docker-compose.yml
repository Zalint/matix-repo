services:
  postgres:
    image: postgres:17
    container_name: matix-postgres
    environment:
      POSTGRES_DB: matix
      POSTGRES_USER: matix_admin
      POSTGRES_PASSWORD: matix_admin_dev
    ports:
      - "5432:5432"
    volumes:
      - matix-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matix_admin -d matix"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: matix-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      # KC 25 utilise KEYCLOAK_ADMIN(_PASSWORD). KC 26+ : KC_BOOTSTRAP_ADMIN_*.
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Persistence sur la DB Postgres (DB 'keycloak' creee par db/init/01_create_keycloak_db.sql).
      # Evite : (a) les soucis de perms volume avec dev-file, (b) la perte des tables
      # avec dev-mem (H2 in-memory perd tout quand les connexions Hikari ferment).
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev
      KC_HEALTH_ENABLED: "true"
    ports:
      # Port host 8081 (8080 souvent occupé par Apache/Tomcat/PEM-Server).
      # Conteneur écoute toujours en interne sur 8080.
      - "8081:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Optional services — activate via: docker compose --profile extras up -d
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: matix-redis
    ports:
      - "6379:6379"
    volumes:
      - matix-redisdata:/data
    profiles: ["extras"]

  mailhog:
    image: mailhog/mailhog:latest
    container_name: matix-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI
    profiles: ["extras"]

  # n8n — orchestrateur de workflows externes (rapports email + agent agrégateur APIs).
  # Transitoire : sera remplacé par les modules natifs Matix (platform.workflows,
  # analytics.ai.agent, analytics.reports.daily_digest) en Phase 2/4.
  # 3 workflows existants dans ./infra/n8n-workflows/ (montés en /workflows pour import).
  # Lancement : docker compose --profile extras up -d n8n
  # UI : http://localhost:5678 (login admin/admin)
  # Pin version — :latest a eu un souci d'extraction (read-only fs) sur certains
  # layers (@azure/msal-browser). 1.74.x est stable et passe sans problème.
  n8n:
    image: n8nio/n8n:1.74.1
    container_name: matix-n8n
    ports:
      - "5678:5678"
    environment:
      # Auth basique (dev only — en prod : Keycloak proxy ou n8n cloud user mgmt)
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin
      # Persistance dans matix-postgres (DB dédiée n8n créée par db/init/02_create_n8n_db.sql)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n_dev
      # URL publique
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      # Timezone (utile pour les schedules cron — workflows MATA tournent en heure Dakar)
      GENERIC_TIMEZONE: Africa/Dakar
      TZ: Africa/Dakar
      # Sécurité : pas d'envoi de telemetry hors instance
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - matix-n8n-data:/home/node/.n8n
      - ./infra/n8n-workflows:/workflows:ro   # JSON dispos pour import dans l'UI
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["extras"]

volumes:
  matix-pgdata:
  matix-redisdata:
  matix-n8n-data:

services:
  postgres:
    image: postgres:17
    container_name: matix-postgres
    environment:
      POSTGRES_DB: matix
      POSTGRES_USER: matix_admin
      POSTGRES_PASSWORD: matix_admin_dev
    ports:
      - "5432:5432"
    volumes:
      - matix-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matix_admin -d matix"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: matix-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      # KC 25 utilise KEYCLOAK_ADMIN(_PASSWORD). KC 26+ : KC_BOOTSTRAP_ADMIN_*.
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Persistence sur la DB Postgres (DB 'keycloak' creee par db/init/01_create_keycloak_db.sql).
      # Evite : (a) les soucis de perms volume avec dev-file, (b) la perte des tables
      # avec dev-mem (H2 in-memory perd tout quand les connexions Hikari ferment).
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Optional services — activate via: docker compose --profile extras up -d
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: matix-redis
    ports:
      - "6379:6379"
    volumes:
      - matix-redisdata:/data
    profiles: ["extras"]

  mailhog:
    image: mailhog/mailhog:latest
    container_name: matix-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI
    profiles: ["extras"]

volumes:
  matix-pgdata:
  matix-redisdata:
